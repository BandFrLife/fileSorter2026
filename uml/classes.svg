@startuml
class Semester {
    - _year : int
    - _season : str
    - _courses : list[tuple[str, int]
    + year() : int
    + year(val : int)
    + season() : str
    + season(val : str)
    + courses() : list[tuple[str, int]
    + courses(arr : list[tuple[str, int])
    __str__() : str
}

class Course {
    - _name : str
    - _number : int
    - _dept : Tag
    + name() : str
    + name(val : str)
    + number() : int
    + number(val : int)
    + dept() : Tag
    + dept(val : Tag)
    __str__() : str
}

class Tag {
}

class GUI {
    - _file : str
    + getTag(file : str) : str
    + setTag(Tag : str)
}

class GuiEventHandler {
    - pickfile() : str
    - pickpath(Tag : str) : str
}

GUI - -> GuiEventHandler : uses
GuiEventHandler - -> Semester : uses
Semester - -> Course : uses
Semester - -> Tag : uses
Course - -> Tag : uses

@enduml

